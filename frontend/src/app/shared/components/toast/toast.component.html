<div class="toast-container">
  <div
    *ngFor="let toast of toasts"
    class="toast-item"
    [class]="getToastClass(toast.type)"
    role="alert"
  >
    <div class="toast-content">
      <i class="bi" [class]="getIconClass(toast.type)"></i>
      <span>{{ toast.message }}</span>
    </div>
    <button
      type="button"
      class="toast-close"
      aria-label="Close"
      (click)="removeToast(toast.id)"
    >
      <i class="bi bi-x"></i>
    </button>
  </div>
</div>
