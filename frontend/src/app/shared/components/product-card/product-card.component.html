<div class="card h-100 product-card shadow-sm">
  <button
    class="btn btn-sm wishlist-btn"
    [class.active]="isWishlisted"
    [disabled]="toggling"
    (click)="toggleWishlist($event)">
    {{ isWishlisted ? '♥' : '♡' }}
  </button>

    <a [routerLink]="['/products', product.id]" class="position-relative d-block">
        <span *ngIf="isLowStock" class="badge bg-warning text-dark px-2 position-absolute top-0 start-0 m-2" style="z-index: 1;">Only {{ product.availableQuantity }} left in stock</span>
        <span *ngIf="isOutOfStock" class="badge bg-danger px-2 position-absolute top-0 start-0 m-2" style="z-index: 1;">Out of Stock</span>
        <img [src]="product.imageUrl" class="card-img-top product-image" [alt]="product.name" onerror="this.onerror=null;this.src='assets/image-placeholder.svg'">
    </a>
  <div class="card-body d-flex flex-column">
    <small class="text-muted">{{ product.brand }}</small>
    <h6 class="card-title">
      <a [routerLink]="['/products', product.id]" class="text-decoration-none text-dark">{{ product.name }}</a>
    </h6>
    <app-star-rating [rating]="product.averageRating" [count]="product.reviewCount"></app-star-rating>
    <div class="mt-auto pt-2">
      <span class="fw-bold text-primary fs-5">{{ product.basePrice | currency:'USD' }}</span>
      <a [routerLink]="['/products', product.id]" class="btn btn-sm btn-outline-primary d-block mt-2">View Details</a>
    </div>
  </div>
</div>
