<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">Saved Carts</h2>
    <a routerLink="/cart" class="btn btn-outline-primary">Back to Cart</a>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>

  <div *ngIf="!loading && savedCarts.length === 0" class="text-center py-5">
    <p class="text-muted fs-5 mb-3">You have no saved carts yet.</p>
    <a routerLink="/cart" class="btn btn-primary">Go to Cart</a>
  </div>

  <div *ngIf="!loading && savedCarts.length > 0" class="row g-3">
    <div *ngFor="let savedCart of savedCarts" class="col-12">
      <div class="card shadow-sm saved-cart-card" role="button" (click)="openSavedCart(savedCart.id)">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h5 class="mb-1 fw-bold">{{ savedCart.cartName }}</h5>
            <div class="small text-muted">{{ savedCart.cartNumber }}</div>
            <div class="text-muted small">Saved on {{ savedCart.savedAt | date:'dd MMM yyyy, hh:mm a' }}</div>
          </div>
          <div class="d-flex align-items-center gap-4">
            <div class="text-center">
              <div class="small text-muted">SKUs</div>
              <div class="fw-semibold">{{ savedCart.skuCount }}</div>
            </div>
            <div class="text-center">
              <div class="small text-muted">Total</div>
              <div class="fw-semibold">$ {{ savedCart.totalPrice | number:'1.2-2' }}</div>
            </div>
            <button
              class="btn btn-sm btn-outline-danger"
              [disabled]="deletingId === savedCart.id"
              (click)="deleteSavedCart(savedCart, $event)">
              {{ deletingId === savedCart.id ? 'Deleting...' : 'Delete' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.saved-cart-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
.saved-cart-card:hover { transform: translateY(-2px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.12); }
</style>
