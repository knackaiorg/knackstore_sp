<div class="container py-4">
  <h2 class="fw-bold mb-4">♡ My Wishlist</h2>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary"></div>
  </div>

  <div *ngIf="!loading && (!wishlist || wishlist.entries.length === 0)" class="text-center py-5">
    <p class="fs-5 text-muted">Your wishlist is empty.</p>
    <a routerLink="/products" class="btn btn-primary">Explore Products</a>
  </div>

  <div *ngIf="!loading && wishlist && wishlist.entries.length > 0" class="row g-4">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div *ngFor="let entry of wishlist.entries; let last = last"
               class="d-flex align-items-center p-3 gap-3" [class.border-bottom]="!last">
            <img [src]="entry.productImageUrl" [alt]="entry.productName" class="rounded"
                 style="width:80px;height:80px;object-fit:cover;cursor:pointer"
                 (click)="viewProduct(entry.productId)">

            <div class="flex-grow-1">
              <h6 class="mb-0 fw-semibold" style="cursor:pointer" (click)="viewProduct(entry.productId)">
                {{ entry.productName }}
              </h6>
              <small *ngIf="entry.variantDescription" class="text-muted">{{ entry.variantDescription }}</small>
              <div class="fw-bold text-primary mt-1">{{ entry.price | currency:'USD' }}</div>
              <small *ngIf="isOutOfStock(entry)" class="text-danger fw-semibold d-block">Out of Stock</small>
            </div>

            <button
              class="btn btn-sm"
              [class.btn-secondary]="isOutOfStock(entry)"
              [class.btn-warning]="!isOutOfStock(entry)"
              [disabled]="movingEntryId === entry.entryId || isOutOfStock(entry)"
              [title]="isOutOfStock(entry) ? 'Out of stock' : 'Move to Cart'"
              (click)="moveToCart(entry.entryId)">
              <span *ngIf="movingEntryId === entry.entryId && !isOutOfStock(entry)" class="spinner-border spinner-border-sm me-1"></span>
              {{ isOutOfStock(entry) ? 'Out of Stock' : 'Move to Cart' }}
            </button>

            <button
              class="btn btn-sm btn-outline-danger"
              [disabled]="removingEntryId === entry.entryId"
              (click)="removeEntry(entry.entryId)">
              Remove
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="fw-bold mb-3">Wishlist Summary</h5>
          <div class="d-flex justify-content-between mb-2">
            <span>Total items</span>
            <span class="fw-semibold">{{ wishlist.totalItems }}</span>
          </div>
          <a routerLink="/products" class="btn btn-outline-secondary w-100 mt-2">Continue Shopping</a>
          <a routerLink="/cart" class="btn btn-primary w-100 mt-2">Go to Cart</a>
        </div>
      </div>
    </div>
  </div>
</div>
